name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # arca targets OpenBSD, but pledge/unveil compile to no-ops elsewhere, so the
    # build + full test suite run on Linux. rusqlite is `bundled` (no system
    # libsqlite3), so the stock runner needs no extra packages.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The repo's self-verifying gate: fmt + clippy (-D warnings) + tests +
      # file-size + tech-debt checks. Mirrors the local pre-commit hook.
      # (Coverage — `make check-cov` — needs cargo-tarpaulin and stays local.)
      - name: make check-fast
        run: make check-fast
